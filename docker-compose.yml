services:

  mongo:
    image: mongo:6.0
    container_name: mongo-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017" # optional for local access
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads # Bind mount for local file access during development
      - backend_node_modules:/app/node_modules # Host's node_modules changes won't affect container
      - backend_pnpm_store:/root/.local/share/pnpm/store # Host's pnpm store changes won't affect container
    container_name: express-backend
    init: true
    command: sh -c "pnpm install && exec pnpm run dev"
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      MONGO_URI: ${MONGO_URI}
      SUPER_EMAIL: ${SUPER_EMAIL}
      SUPER_PASS: ${SUPER_PASS}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules # Host's node_modules changes won't affect container
      - frontend_pnpm_store:/root/.local/share/pnpm/store # Host's pnpm store changes won't affect container
    container_name: vite-frontend
    init: true
    command: sh -c "pnpm install && exec pnpm run dev -- --port 5173"
    stdin_open: true
    tty: true
    environment:
      NODE_ENV: ${NODE_ENV}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    networks:
      - app-network
    
  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  backend_node_modules:
  backend_pnpm_store:
  frontend_node_modules:
  frontend_pnpm_store:
  mongo_data:
  redis_data:

networks:
  app-network:
    driver: bridge